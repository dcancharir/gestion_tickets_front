<div   [class.show]="true"  [style.display]="'block'" class="modal fade" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-4">Modal title</h1>
                <button type="button" class="btn-close" (click)="closeModal()"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-12">
                        <div class="pure-card rounded-custom card-bg shadow-custom">
                            <div class="pure-card-header d-flex flex-wrap align-items-center justify-content-between gap-7">
                                <h3 class="pure-card-title d-flex align-items-center gap-2 m-0">
                                    Incidencia Information
                                </h3>
                            </div>
                            <div class="pure-card-body">
                                <div class="row gy-5">
                                    <div class="col-md-6 col-sm-12">
                                        <label for="title" class="form-label">Titulo</label>
                                        <input type="text" class="form-control" [(ngModel)]="form().titulo" placeholder="Ingrese Titulo">
                                    </div>
                                    <div class="col-md-6 col-sm-12">
                                        <label for="slug" class="form-label">Categoria</label>
                                        <select class="form-select" [(ngModel)]="form().categoriaId">
                                            <option value="0">Seleccione Categoria</option>
                                            @for(r of categorias.value(); track r.categoriaId){
                                                <option value="{{r.categoriaId}}">{{r.nombre}}</option>
                                            }
                                        </select>
                                    </div>
                                    <div class="col-md-6 col-sm-12">
                                        <label for="title" class="form-label">Canal Reporte</label>
                                        <select class="form-select" [(ngModel)]="form().canalReporte">
                                            <option value="">Seleccione Canal</option>
                                            <option value="WHATSAPP">WhatsApp</option>
                                            <option value="EMAIL">Email</option>
                                            <option value="TELEFONO">Telefono</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 col-sm-12">
                                        <label for="slug" class="form-label">Impacto</label>
                                        <select class="form-select" [(ngModel)]="form().impacto">
                                            <option value="0">Seleccione Impacto</option>
                                            <option value="1">Alta</option>
                                            <option value="2">Media</option>
                                            <option value="3">Baja</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 col-sm-12">
                                        <label for="slug" class="form-label">Urgencia</label>
                                        <select class="form-select" [(ngModel)]="form().urgencia">
                                            <option value="0">Seleccione Urgencia</option>
                                            <option value="1">Alta</option>
                                            <option value="2">Media</option>
                                            <option value="3">Baja</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 col-sm-12">
                                        <label for="slug" class="form-label">Prioridad</label>
                                        <select class="form-select" [(ngModel)]="form().prioridadId">
                                            <option value="0">Seleccione Prioridad</option>
                                            @for(r of prioridades.value(); track r.prioridadId){
                                                <option value="{{r.prioridadId}}">{{r.nombre}}</option>
                                            }
                                        </select>
                                    </div>
                                    <div class="col-md-6 col-sm-12">
                                        <label for="slug" class="form-label">Sede</label>
                                        <select class="form-select" [(ngModel)]="form().sedeId">
                                            <option value="0">Seleccione Sede</option>
                                            @for(r of sedes.value(); track r.sedeId){
                                                <option value="{{r.sedeId}}">{{r.nombre}}</option>
                                            }
                                        </select>
                                    </div>
                                    <div class="col-md-12 col-sm-12">
                                        <label for="title" class="form-label">Descripcion</label>
                                        <textarea class="form-control" [(ngModel)]="form().descripcion" placeholder="Ingrese Descripcion"></textarea>
                                    </div>
                                    <div class="col-md-12 col-sm-12">
                                        <label for="" class="form-label">Adjuntos</label>
                                        <input type="file" multiple (change)="onFilesSelected($event)" class="form-control">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-label-danger" (click)="closeModal()">Close</button>
                <button type="button" class="btn btn-primary" (click)="guardar()">Guardar</button>
            </div>
        </div>
    </div>
</div>
