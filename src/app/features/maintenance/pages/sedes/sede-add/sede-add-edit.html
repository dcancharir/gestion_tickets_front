<div   [class.show]="true"  [style.display]="'block'" class="modal fade" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                  <h3 class="pure-card-title d-flex align-items-center gap-2 m-0">
                                    {{!sede()?.sedeId?'Crear':'Editar'}} Sede
                                </h3>
                <button type="button" class="btn-close" (click)="closeModal()"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-12">
                        <div class="pure-card rounded-custom card-bg shadow-custom" style="padding-top: 30px;">
                            <!-- <div class="pure-card-header d-flex flex-wrap align-items-center justify-content-between gap-7">
                              
                            </div> -->
                            <div class="pure-card-body">
                                <div class="row gy-5">
                                    <div class="col-md-12 col-sm-12">
                                        <label for="" class="form-label">Id Externo</label>
                                        <input type="number" class="form-control" [(ngModel)]="form().sedeIdExterno" placeholder="Ingrese Id Externo" [readOnly]="sede()?.sedeId? true : false">
                                    </div>
                                    <div class="col-md-12 col-sm-12">
                                        <label for="" class="form-label">Nombre</label>
                                        <input type="email" class="form-control" [(ngModel)]="form().nombre" placeholder="Ingrese Nombre">
                                    </div>
                                    <div class="col-md-12 col-sm-12">
                                        <label for="" class="form-label">Tipo</label>
                                        <select class="form-select" [(ngModel)]="form().tipoSede">
                                            <option value="">Seleccione</option>
                                            <option value="SALA">Sala</option>
                                            <option value="HOTEL">Hotel</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-danger" (click)="closeModal()">Cancelar</button>
                <button type="button" class="btn btn-orange" (click)="guardar()">Guardar</button>
            </div>
        </div>
    </div>
</div>
