      <div class="maint-modal-panel">

      <div class="modal-dark-header">
        <h5 class="modal-title">
          {{ !usuario()?.publicId?.trim() ? 'Nuevo Usuario' : 'Editar Usuario' }}
        </h5>
        <button type="button" class="btn-close-custom" (click)="closeModal()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="modal-dark-body">
        <div style="margin-bottom:16px">
          <label class="form-label-dark">Nombres <span class="req">*</span></label>
          <input type="text" class="form-input-dark"
                 [(ngModel)]="form().nombre"
                 placeholder="Ingrese nombres">
        </div>
        <div style="margin-bottom:16px">
          <label class="form-label-dark">Apellidos <span class="req">*</span></label>
          <input type="text" class="form-input-dark"
                 [(ngModel)]="form().apellidos"
                 placeholder="Ingrese apellidos">
        </div>
        <div style="margin-bottom:16px">
          <label class="form-label-dark">Email <span class="req">*</span></label>
          <input type="email" class="form-input-dark"
                 [(ngModel)]="form().email"
                 placeholder="Ingrese email">
        </div>
        <div style="margin-bottom:16px">
          <label class="form-label-dark">UserName <span class="req">*</span></label>
          <input type="text" class="form-input-dark"
                 [(ngModel)]="form().userName"
                 placeholder="Ingrese username">
        </div>
        <div class="mp-grid-2">
          <div>
            <label class="form-label-dark">Rol <span class="req">*</span></label>
            <select class="form-input-dark" [(ngModel)]="form().rolId">
              <option value="0">Seleccione rol</option>
              @for (r of (roles.error() ? [] : (roles.value() ?? [])); track r.rolId) {
                <option [value]="r.rolId">{{ r.nombre }}</option>
              }
            </select>
          </div>
          <div>
            <label class="form-label-dark">Estado</label>
            <select class="form-input-dark" [(ngModel)]="form().activo">
              <option [ngValue]="true">Activo</option>
              <option [ngValue]="false">Inactivo</option>
            </select>
          </div>
        </div>
      </div>

      <div class="modal-dark-footer">
        <button type="button" class="btn-modal-cancel" (click)="closeModal()">Cancelar</button>
        <button type="button" class="btn-modal-save" (click)="guardar()">Guardar</button>
      </div>
