      <div class="maint-modal-panel">

      <div class="modal-dark-header">
        <h5 class="modal-title">
          {{ !estado()?.estadoId ? 'Nuevo Estado' : 'Editar Estado' }}
        </h5>
        <button type="button" class="btn-close-custom" (click)="closeModal()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="modal-dark-body">
        <div style="margin-bottom:16px">
          <label class="form-label-dark">Nombre <span class="req">*</span></label>
          <input type="text" class="form-input-dark"
                 [(ngModel)]="form().nombre"
                 placeholder="Ingrese nombre">
        </div>
        <div style="margin-bottom:16px">
          <label class="form-label-dark">Descripción</label>
          <input type="text" class="form-input-dark"
                 [(ngModel)]="form().descripcion"
                 placeholder="Ingrese descripción">
        </div>
        <div style="margin-bottom:8px">
          <label class="form-label-dark">¿Es Estado Final?</label>
          <select class="form-input-dark" [(ngModel)]="form().esEstadoFinal">
            <option [ngValue]="true">Sí</option>
            <option [ngValue]="false">No</option>
          </select>
        </div>
      </div>

      <div class="modal-dark-footer">
        <button type="button" class="btn-modal-cancel" (click)="closeModal()">Cancelar</button>
        <button type="button" class="btn-modal-save" (click)="guardar()">Guardar</button>
      </div>
