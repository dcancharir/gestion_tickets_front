<div   [class.show]="true"  [style.display]="'block'" class="modal fade" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-4">Modal title</h1>
                <button type="button" class="btn-close" (click)="closeModal()"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-12">
                        <div class="pure-card rounded-custom card-bg shadow-custom">
                            <div class="pure-card-header d-flex flex-wrap align-items-center justify-content-between gap-7">
                                <h3 class="pure-card-title d-flex align-items-center gap-2 m-0">
                                    {{!rol()?.rolId ? 'Add':'Update'}} Role Information
                                </h3>
                            </div>
                            <div class="pure-card-body">
                                <div class="row gy-5">
                                    <div class="col-md-12">
                                        <label for="title" class="form-label">Nombres</label>
                                        <input type="text" class="form-control" [(ngModel)]="form().nombre" placeholder="Ingrese nombre de rol">
                                    </div>
                                    <div class="col-md-12">
                                        <label for="title" class="form-label">Descripción</label>
                                        <textarea name="descripcion" class="form-control" [(ngModel)]="form().descripcion" placeholder="Ingrese descripción del rol"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-label-danger" (click)="closeModal()">Close</button>
                <button type="button" class="btn btn-primary" (click)="guardar()">Guardar</button>
            </div>
        </div>
    </div>
</div>
