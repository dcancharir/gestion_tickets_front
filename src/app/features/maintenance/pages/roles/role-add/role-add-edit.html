<div [class.show]="true" [style.display]="'block'" class="modal fade" tabindex="-1" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content modal-dark">

      <div class="modal-header modal-dark-header">
        <h5 class="modal-title">
          {{ !rol()?.rolId ? 'Nuevo Rol' : 'Editar Rol' }}
        </h5>
        <button type="button" class="btn-close-custom" (click)="closeModal()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="modal-body modal-dark-body">
        <div class="mb-4">
          <label class="form-label-dark">Nombre <span class="req">*</span></label>
          <input type="text" class="form-input-dark"
                 [(ngModel)]="form().nombre"
                 placeholder="Ingrese nombre del rol">
        </div>
        <div class="mb-2">
          <label class="form-label-dark">Descripción</label>
          <textarea class="form-input-dark"
                    [(ngModel)]="form().descripcion"
                    placeholder="Ingrese descripción del rol"></textarea>
        </div>
      </div>

      <div class="modal-footer modal-dark-footer">
        <button type="button" class="btn-modal-cancel" (click)="closeModal()">Cancelar</button>
        <button type="button" class="btn-modal-save" (click)="guardar()">Guardar</button>
      </div>

    </div>
  </div>
</div>
