<!-- app content start -->
<div class="app-content-wrapper py-20 pb-13">
    <div class="container ">
        <div class="page-header pb-7 d-flex justify-content-between align-items-center gap-6 flex-wrap">
            <div class="">
                <h2 class="fw-semibold fs-7">All Roles</h2>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">All Users</li>
                    </ol>
                </nav>
            </div>
            <div class="row">
                <!-- <a href="javascript:void(0)" class="btn btn-primary d-flex align-items-center gap-2">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 1V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M1 8H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Permissions
                </a> -->
                <div class="col-md-12">
                    <select class="form-select" (change)="getPermissions()" [(ngModel)]="selectedRolId" placeholder="Seleccione">
                        @for(rol of roles.value(); track rol.rolId){
                            <option [value]="rol.rolId">{{rol.nombre}}</option>
                        }
                    </select>
                </div>
            </div>
        </div> <!-- breadcrumb end -->

        <div class="page-content">
            <div class="row">
                @for(grupo of agrupadosArray(); track grupo.controlador){
                <div class="col-md-3">
                    <div class="pure-card rounded-custom card-bg shadow-custom mb-6">
                        <div class="pure-card-header">
                            <h3 class="pure-card-title d-flex align-items-center gap-2 m-0">
                                <span class="text-primary d-flex align-items-center">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path opacity="0.3" d="M12 24C18.6274 24 24 18.6274 24 12C24 5.37258 18.6274 0 12 0C5.37258 0 0 5.37258 0 12C0 18.6274 5.37258 24 12 24Z" fill="currentColor"></path>
                                        <path d="M16.8125 11.1H12.9125V7.20005C12.9125 6.70805 12.5045 6.30005 12.0125 6.30005C11.5205 6.30005 11.1125 6.70805 11.1125 7.20005V11.1H7.2125C6.7205 11.1 6.3125 11.508 6.3125 12C6.3125 12.492 6.7205 12.9 7.2125 12.9H11.1125V16.8001C11.1125 17.2921 11.5205 17.7001 12.0125 17.7001C12.5045 17.7001 12.9125 17.2921 12.9125 16.8001V12.9H16.8125C17.3045 12.9 17.7125 12.492 17.7125 12C17.7125 11.508 17.3045 11.1 16.8125 11.1Z" fill="currentColor"></path>
                                    </svg>
                                </span>
                                {{grupo.controlador == '' ? 'Vistas' : grupo.controlador}}
                            </h3>
                            <input class="form-check-input float-end" type="checkbox" value="">
                        </div>
                    
                        <div class="pure-card-body">
                            <div class="row row-cols-1 gy-5 ">
                                <div class="course-category-checkbox">
                                    <div class="d-flex flex-column gap-3">
                                        @for (permiso of grupo.permisos; track permiso.permisoId) {
                                            <div class="form-check">
                                                <label class="form-check-label" for="web_design">
                                                    {{permiso.nombre}}
                                                </label>
                                                <input class="form-check-input float-end" type="checkbox" value="">
                                            </div>
                                        }
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                }
                

            </div>
        </div><!-- page content end -->

    </div>
</div><!-- app content end -->
